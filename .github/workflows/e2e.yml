name: E2E Tests (Dual-Repo)

on:
  push:
    branches:
      - test
      - main
  pull_request:

jobs:
  e2e:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@v4
        with:
          path: lovable-site-source

      - name: Checkout E2E Repository
        uses: actions/checkout@v4
        with:
          repository: dmulyukov-lgtm/portfoilio-E2E
          path: e2e-tests
          # Если репозиторий с тестами приватный, раскомментируйте строку ниже и добавьте токен в Secrets
          # token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: ./lovable-site-source
        run: npm ci || npm install --legacy-peer-deps

      - name: Install E2E Dependencies
        working-directory: ./e2e-tests
        run: npm ci || npm install

      - name: Install Playwright Browsers
        working-directory: ./e2e-tests
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        working-directory: ./e2e-tests
        # Playwright сам запустит 'npm run build && npm run preview' в соседней папке (согласно playwright.config.ts)
        run: npx playwright test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 30
